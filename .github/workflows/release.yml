name: Release

on:
  workflow_dispatch:

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Inject version into manifest
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          sed -i 's/"version": "0.0.0-dev"/"version": "${{ steps.semantic.outputs.new_release_version }}"/' \
            custom_components/homeassistant_otel/manifest.json

      - name: Create zip
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          cd custom_components/homeassistant_otel
          zip -r ../../homeassistant-otel.zip .

      - name: Upload zip to release
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          gh release upload ${{ steps.semantic.outputs.new_release_version }} homeassistant-otel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
